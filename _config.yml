title: Блог Юли
description: Блог о книгах, программировании и всяком таком.
baseurl: "" # the subpath of your site, e.g. /blog
# url: "" # the base hostname & protocol for your site, e.g. http://example.com
# github_username:  

# Build settings
theme: minima

# Site settings
permalink: /:title/
markdown: kramdown
paginate: 4
paginate_path: "/:num/"
date_format: "%b %-d, %Y"

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing.
